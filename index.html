<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones RC - Registro de Pagos</title>
    <style>
        /* ESTILO PERSONALIZADO INVERSIONES RC (NEGRO Y NARANJA) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* Fondo Negro */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2d2d2d; /* Gris muy oscuro */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #ff9800; /* Línea Naranja arriba */
        }
        h2 {
            text-align: center;
            color: #ff9800; /* Naranja */
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9em;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #3d3d3d;
            color: white;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #ff9800;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff9800; /* Naranja */
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #e68a00;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #777;
            cursor: not-allowed;
        }
        #mensaje {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }
        .logo {
            display: block;
            margin: 0 auto 10px;
            max-width: 100px; /* Ajusta según tu logo */
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Inversiones RC</h2>
    
    <form id="pagoForm">
        <label>Tipo de Operación</label>
        <select id="PaymentType" required>
            <option value="P2P">Pago Móvil (P2P)</option>
            <option value="TRF">Transferencia (TRF)</option>
            <option value="DEP">Depósito Bancario</option>
        </select>

        <label>Referencia Bancaria</label>
        <input type="text" id="DestinyBankReference" placeholder="Últimos 6 u 8 dígitos" required>

        <label>Monto (Bs.)</label>
        <input type="number" step="0.01" id="Amount" placeholder="0.00" required>

        <label>Cédula / RIF del Cliente</label>
        <input type="text" id="ClientID" placeholder="V-12345678" required>

        <button type="submit" id="btnEnviar">REGISTRAR PAGO</button>
    </form>
    
    <div id="mensaje"></div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE SEGURIDAD (EDITA AQUÍ)
    // ==========================================
    const API_URL = "https://inversiones-rc-prod.onrender.com"; 
    const BNC_USER = "admin_rc"; // REVISA QUE SEA IGUAL A RENDER
    const BNC_PASS = "123456";   // REVISA QUE SEA IGUAL A RENDER

    document.getElementById('pagoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensaje');
        
        // Bloquear botón y mostrar carga
        btn.disabled = true;
        msg.style.color = "#ff9800";
        msg.innerText = "Verificando con el servidor...";

        try {
            // 1. OBTENER TOKEN (JWT)
            const authRes = await fetch(${API_URL}/auth, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "Login": BNC_USER, "Password": BNC_PASS })
            });

            if (!authRes.ok) throw new Error("Acceso denegado: Revisa usuario/clave");
            const token = await authRes.text();

            // 2. PREPARAR DATOS
            const datos = {
                PaymentType: document.getElementById('PaymentType').value,
                DestinyBankReference: document.getElementById('DestinyBankReference').value,
                Amount: document.getElementById('Amount').value,
                ClientID: document.getElementById('ClientID').value,
                Date: new Date().toLocaleString()
            };

            // 3. ENVIAR A RENDER -> EXCEL
            const res = await fetch(${API_URL}/webhook-bnc, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': Bearer ${token} 
                },
                body: JSON.stringify(datos)
            });

            if (res.ok) {
                msg.style.color = "#4CAF50"; // Verde éxito
                msg.innerText = "✅ PAGO REGISTRADO EXITOSAMENTE";
                document.getElementById('pagoForm').reset();
            } else {
                throw new Error("Error al guardar en la base de datos");
            }

        } catch (err) {
            msg.style.color = "#f44336"; // Rojo error
            msg.innerText = "❌ " + err.message;
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
