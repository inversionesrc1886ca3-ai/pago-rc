<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones RC - Registro de Pagos</title>
    <style>
        /* ESTILO PERSONALIZADO INVERSIONES RC */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #ff5722;
            text-align: center;
        }
        .logo {
            max-width: 120px;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        h2 {
            color: #ff5722;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 1.4em;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #bbb;
            font-size: 0.85em;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #333;
            color: white;
            box-sizing: border-box;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: #ff5722;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff9800;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #e68a00;
            transform: scale(1.02);
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        #mensaje {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9em;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.imgur.com/Of9gXSc.png" alt="Inversiones RC Logo" class="logo">
    <h2>Inversiones RC</h2>
    
    <form id="pagoForm">
        <label>Tipo de Operación</label>
        <select id="PaymentType" required>
            <option value="P2P">Pago Móvil (P2P)</option>
            <option value="TRF">Transferencia (TRF)</option>
            <option value="DEP">Depósito Bancario</option>
        </select>

        <label>Referencia Bancaria</label>
        <input type="text" id="DestinyBankReference" placeholder="Ej: 12345678" required>

        <label>Monto (Bs.)</label>
        <input type="number" step="0.01" id="Amount" placeholder="0.00" required>

        <label>Cédula / RIF del Cliente</label>
        <input type="text" id="ClientID" placeholder="V-12345678" required>

        <button type="submit" id="btnEnviar">Registrar Pago</button>
    </form>
    
    <div id="mensaje"></div>
</div>

<script>
    const API_URL = "https://inversiones-rc-prod.onrender.com"; 
    const BNC_USER = "admin_rc"; 
    const BNC_PASS = "123456";

    document.getElementById('pagoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensaje');
        
        btn.disabled = true;
        msg.style.color = "#ff9800";
        msg.innerText = "Verificando pago...";

        try {
            // 1. OBTENER TOKEN JWT (Corregido con comillas invertidas)
            const authRes = await fetch(`${API_URL}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "Login": BNC_USER, "Password": BNC_PASS })
            });

            if (!authRes.ok) throw new Error("Acceso no autorizado");
            const token = await authRes.text();

            // 2. PREPARAR DATOS
            const datos = {
                PaymentType: document.getElementById('PaymentType').value,
                DestinyBankReference: document.getElementById('DestinyBankReference').value,
                Amount: document.getElementById('Amount').value,
                ClientID: document.getElementById('ClientID').value,
                Date: new Date().toLocaleString('es-VE')
            };

            // 3. ENVIAR A RENDER (Corregido con comillas invertidas)
            const res = await fetch(`${API_URL}/webhook-bnc`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify(datos)
            });

            if (res.ok) {
                msg.style.color = "#4CAF50"; 
                msg.innerText = "✅ REGISTRO EXITOSO";
                document.getElementById('pagoForm').reset();
            } else {
                throw new Error("Error al guardar en el sistema");
            }

        } catch (err) {
            msg.style.color = "#f44336"; 
            msg.innerText = "❌ " + err.message;
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
