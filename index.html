<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Inversiones RC - Validador Oficial</title>
    <style>
        body{font-family:'Segoe UI',Roboto,sans-serif;background:#000;padding:15px;margin:0;color:#fff}
        #panel{background:#111;padding:20px;border-radius:15px;box-shadow:0 0 25px rgba(255,145,0,0.3);max-width:450px;margin:auto;text-align:center;border:1px solid #ff9100}
        .logo-text{font-size: 2.5em; color: #ff9100; font-weight: bold; margin-bottom: 5px; letter-spacing: 4px;}
        .sub-logo{font-size: 0.9em; color: #fff; margin-bottom: 20px; letter-spacing: 1px; opacity: 0.8;}
        h2{color:#ff9100;border-bottom:2px solid #ff9100;padding-bottom:10px;font-size:1.1em;margin-top:0;text-transform:uppercase}
        .input-group { text-align: left; margin-bottom: 12px; }
        label { color: #ff9100; font-size: 0.8em; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ff9100; border-radius: 8px; box-sizing:border-box; background:#222; color:#fff; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #ff9100; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #ff9100; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th { background: #ff9100; padding: 10px; color: #000; font-size: 0.8em; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; font-size: 0.9em; }
        .status-ok { color: #00ff00; font-weight: bold; }
        .footer { color: #ff9100; font-size: 0.75em; margin-top: 25px; font-weight: bold; opacity: 0.8; }
    </style>
</head>
<body>
<div id="panel">
    <div class="logo-text">RC</div>
    <div class="sub-logo">INVERSIONES</div>
    <h2>Validador de Pagos BNC</h2>

    <div class="input-group">
        <label>Vendedor</label>
        <input type="text" id="Vendedor" placeholder="Tu nombre" required>
    </div>
    <div class="input-group">
        <label>Cédula del Cliente</label>
        <input type="text" id="DebtorID" placeholder="Ej: V23000760">
    </div>
    <div class="input-group">
        <label>Teléfono Origen</label>
        <input type="number" id="Phone" placeholder="Ej: 584241234567">
    </div>
    <div class="input-group">
        <label>Banco del Cliente</label>
        <select id="Bank">
            <option value="BNC">BNC</option>
            <option value="BANESCO">BANESCO</option>
            <option value="MERCANTIL">MERCANTIL</option>
            <option value="PROVINCIAL">PROVINCIAL</option>
            <option value="VENEZUELA">VENEZUELA</option>
            <option value="OTRO">OTRO</option>
        </select>
    </div>
    <div class="input-group">
        <label>Monto (Bs.)</label>
        <input type="number" step="0.01" id="Amount" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>Referencia (6 últimos)</label>
        <input type="text" id="Reference" placeholder="Ej: 123456">
    </div>

    <button onclick="verificarPago()">VERIFICAR Y REGISTRAR</button>

    <table class="result-table" id="tablaResultado">
        <thead><tr><th>ESTADO</th><th>CONFIRMACIÓN</th></tr></thead>
        <tbody>
            <tr><td id="statusCell" class="status-ok">...</td><td id="messageCell">Esperando...</td></tr>
        </tbody>
    </table>
    <div class="footer">SISTEMA OFICIAL INVERSIONES RC</div>
</div>

<script>
    async function verificarPago() {
        const vendedor = document.getElementById('Vendedor').value;
        if(!vendedor) { alert("Ingresa tu nombre"); return; }

        const tabla = document.getElementById('tablaResultado');
        const mensaje = document.getElementById('messageCell');
        const status = document.getElementById('statusCell');

        tabla.style.display = 'table';
        mensaje.innerText = "Registrando...";
        status.innerText = "ESPERE";

        const datos = {
            Vendedor: vendedor,
            DebtorID: document.getElementById('DebtorID').value,
            Phone: document.getElementById('Phone').value,
            Bank: document.getElementById('Bank').value,
            Amount: document.getElementById('Amount').value,
            Reference: document.getElementById('Reference').value
        };

        try {
            const respuesta = await fetch('https://api-pago-rc.onrender.com/verificar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            const resultado = await respuesta.json();
            status.innerText = resultado.status;
            mensaje.innerText = resultado.mensaje;
        } catch (error) {
            status.innerText = "ERROR";
            mensaje.innerText = "Servidor cargando...";
        }
    }
</script>
</body>
</html>
